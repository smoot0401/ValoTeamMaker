<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내전 팀 생성기</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.1/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css');

:root{
  --m3-primary:#ff4655;
  --m3-on-primary:#ffffff;
  --m3-primary-container:#5c1620;
  --m3-on-primary-container:#ffd9dc;
  --m3-secondary:#7ce0e6;
  --m3-on-secondary:#00363a;
  --m3-secondary-container:#1c3a3c;
  --m3-on-secondary-container:#b8f0f4;
  --m3-surface:#121014;
  --m3-surface-dim:#0c0b0d;
  --m3-surface-container-low:#18161a;
  --m3-surface-container:#1e1c20;
  --m3-surface-container-high:#28252a;
  --m3-surface-container-highest:#332f35;
  --m3-on-surface:#e7e1e6;
  --m3-on-surface-variant:#cac4cf;
  --m3-outline:#948f96;
  --m3-outline-variant:#48454a;
  --m3-error:#ffb4ab;
  --m3-shadow: 0 1px 3px rgba(0,0,0,.45), 0 1px 2px rgba(0,0,0,.35);
  --radius-s:8px;
  --radius-m:14px;
  --radius-l:20px;
  --radius-xl:28px;
  --radius-pill:999px;
}
html[data-theme="light"]{
  --m3-primary:#b3261e;
  --m3-on-primary:#ffffff;
  --m3-primary-container:#ffdad6;
  --m3-on-primary-container:#410002;
  --m3-secondary:#00696e;
  --m3-on-secondary:#ffffff;
  --m3-secondary-container:#a2eff0;
  --m3-on-secondary-container:#002021;
  --m3-surface:#fbf8fa;
  --m3-surface-dim:#f2eef1;
  --m3-surface-container-low:#f5f1f4;
  --m3-surface-container:#efebee;
  --m3-surface-container-high:#e9e5e8;
  --m3-surface-container-highest:#e3dfe2;
  --m3-on-surface:#1c1b1e;
  --m3-on-surface-variant:#49454b;
  --m3-outline:#7a757b;
  --m3-outline-variant:#cac5cb;
  --m3-error:#ba1a1a;
  --m3-shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,'Malgun Gothic',sans-serif;
  background:var(--m3-surface-dim);
  color:var(--m3-on-surface);
  min-height:100vh;
  transition:background .25s ease,color .25s ease;
}

.app-shell{
  max-width:720px;
  margin:0 auto;
  padding:20px 16px 80px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}
.topbar h1{
  font-size:20px;
  font-weight:800;
  letter-spacing:-.02em;
  margin:0;
  display:flex;
  align-items:center;
  gap:8px;
}
.topbar h1 .accent{
  color:var(--m3-primary);
}
.topbar-actions{
  display:flex;
  gap:6px;
}
.icon-btn{
  width:38px;height:38px;
  border-radius:var(--radius-pill);
  border:none;
  background:var(--m3-surface-container);
  color:var(--m3-on-surface-variant);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:16px;
  transition:background .15s ease, transform .1s ease;
}
.icon-btn:hover{background:var(--m3-surface-container-high);}
.icon-btn:active{transform:scale(.92);}
.icon-btn:disabled{opacity:.35;cursor:not-allowed;}

.menu-switch{
  display:flex;
  background:var(--m3-surface-container-low);
  border-radius:var(--radius-pill);
  padding:4px;
  margin-bottom:18px;
  gap:4px;
}
.menu-tab{
  flex:1;
  border:none;
  background:transparent;
  color:var(--m3-on-surface-variant);
  font-family:inherit;
  font-weight:700;
  font-size:14px;
  padding:10px 12px;
  border-radius:var(--radius-pill);
  cursor:pointer;
  transition:background .18s ease,color .18s ease;
}
.menu-tab.active{
  background:var(--m3-primary);
  color:var(--m3-on-primary);
}

.card{
  background:var(--m3-surface-container-low);
  border-radius:var(--radius-l);
  padding:18px;
  margin-bottom:16px;
  border:1px solid var(--m3-outline-variant);
}
.card-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.card-header h2{
  font-size:15px;
  font-weight:800;
  margin:0;
  display:flex;
  align-items:center;
  gap:8px;
}
.member-count{
  font-size:12px;
  font-weight:600;
  color:var(--m3-on-surface-variant);
  background:var(--m3-surface-container-high);
  padding:3px 9px;
  border-radius:var(--radius-pill);
}

.text-field{
  width:100%;
  background:var(--m3-surface-container);
  border:1px solid var(--m3-outline-variant);
  color:var(--m3-on-surface);
  font-family:inherit;
  font-size:14px;
  padding:13px 16px;
  border-radius:var(--radius-m);
  outline:none;
  margin-bottom:12px;
  transition:border-color .15s ease, background .15s ease;
}
.text-field:focus{border-color:var(--m3-primary);}
.text-field::placeholder{color:var(--m3-on-surface-variant);}
.text-field:disabled{opacity:.5;}

.chip-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  min-height:20px;
}
.chip-row:empty::after{
  content:"입력한 멤버가 여기에 표시돼요";
  color:var(--m3-on-surface-variant);
  font-size:13px;
}

.member-chip{
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--m3-surface-container-high);
  border:1.5px solid transparent;
  border-radius:var(--radius-pill);
  padding:8px 8px 8px 14px;
  cursor:pointer;
  user-select:none;
  transition:background .15s ease, border-color .15s ease, transform .1s ease;
  position:relative;
}
.member-chip:active{transform:scale(.97);}
.member-chip.selected{
  border-color:var(--m3-primary);
  background:var(--m3-primary-container);
  color:var(--m3-on-primary-container);
}
.member-chip .name{
  font-size:14px;
  font-weight:600;
  max-width:110px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.member-chip .name-input{
  font-family:inherit;
  font-size:14px;
  font-weight:600;
  background:transparent;
  border:none;
  outline:none;
  color:inherit;
  width:90px;
}
.chip-icon-btn{
  width:22px;height:22px;
  border-radius:50%;
  border:none;
  background:transparent;
  color:inherit;
  opacity:.65;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:12px;
  flex-shrink:0;
}
.chip-icon-btn:hover{opacity:1;background:rgba(128,128,128,.25);}
.chip-icon-btn.link-btn.pending{
  opacity:1;
  color:var(--m3-primary);
  animation:pulse 1s infinite;
}
.chip-icon-btn.link-btn.linked{opacity:1;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

.tier-select{
  font-family:inherit;
  font-size:11px;
  font-weight:700;
  border:none;
  border-radius:var(--radius-pill);
  padding:3px 8px;
  outline:none;
  cursor:pointer;
  margin-left:2px;
  color:#141414;
  max-width:88px;
}

/* balanced grid */
.balanced-grid{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.balanced-row{
  display:grid;
  grid-template-columns:1fr 28px 1fr;
  align-items:center;
  gap:6px;
}
.row-divider{
  text-align:center;
  color:var(--m3-outline);
  font-weight:700;
  font-size:15px;
}
.team-slot{
  min-height:52px;
  border-radius:var(--radius-m);
  border:1.5px dashed var(--m3-outline-variant);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 8px 8px 14px;
  cursor:pointer;
  gap:6px;
  background:var(--m3-surface-container-low);
  transition:border-color .15s ease, background .15s ease, transform .08s ease;
}
.team-slot:active{transform:scale(.98);}
.team-slot.empty{
  color:var(--m3-on-surface-variant);
  font-size:12px;
  justify-content:center;
}
.team-slot.empty:hover{border-color:var(--m3-primary);color:var(--m3-primary);}
.team-slot.filled{
  border-style:solid;
  border-color:var(--m3-outline-variant);
  background:var(--m3-surface-container-high);
}
.team-slot.filled.selected{
  border-color:var(--m3-primary);
  background:var(--m3-primary-container);
  color:var(--m3-on-primary-container);
}
.team-slot .slot-name{
  font-size:14px;
  font-weight:700;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.team-slot .slot-actions{
  display:flex;
  gap:2px;
  flex-shrink:0;
}

.action-row{
  display:flex;
  gap:8px;
  margin-top:16px;
  flex-wrap:wrap;
}
.btn{
  font-family:inherit;
  font-weight:700;
  font-size:14px;
  border:none;
  border-radius:var(--radius-pill);
  padding:12px 20px;
  cursor:pointer;
  transition:background .15s ease, opacity .15s ease, transform .08s ease;
  flex:1;
  min-width:110px;
}
.btn:active{transform:scale(.97);}
.btn-filled{
  background:var(--m3-primary);
  color:var(--m3-on-primary);
}
.btn-filled:disabled{
  background:var(--m3-surface-container-high);
  color:var(--m3-outline);
  cursor:not-allowed;
}
.btn-tonal{
  background:var(--m3-secondary-container);
  color:var(--m3-on-secondary-container);
}
.btn-outlined{
  background:transparent;
  color:var(--m3-on-surface);
  border:1.5px solid var(--m3-outline-variant);
}
.hidden{display:none !important;}

.menu-view{display:none;}
.menu-view.active{display:block;}

.candidate-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:14px 0;
}
.candidate-btn{
  font-family:inherit;
  border:1.5px solid var(--m3-outline-variant);
  background:var(--m3-surface-container);
  color:var(--m3-on-surface-variant);
  border-radius:var(--radius-pill);
  padding:9px 14px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  transition:all .15s ease;
}
.candidate-btn:hover{border-color:var(--m3-primary);}
.candidate-btn.active{
  background:var(--m3-primary);
  color:var(--m3-on-primary);
  border-color:var(--m3-primary);
}

.tier-teams{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.tier-team-col{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.tier-team-col .col-title{
  font-size:12px;
  font-weight:800;
  color:var(--m3-on-surface-variant);
  text-align:center;
  margin-bottom:2px;
}
.tier-team-col .col-score{
  font-size:11px;
  text-align:center;
  color:var(--m3-outline);
  margin-bottom:6px;
}

.empty-hint{
  color:var(--m3-on-surface-variant);
  font-size:13px;
  text-align:center;
  padding:14px 0;
}

.toast{
  position:fixed;
  bottom:28px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--m3-surface-container-highest);
  color:var(--m3-on-surface);
  border-radius:var(--radius-pill);
  padding:13px 22px;
  font-size:13px;
  font-weight:700;
  box-shadow:var(--m3-shadow);
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease, transform .25s ease;
  z-index:999;
  white-space:nowrap;
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.map-actions-row{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:14px;
}
.small-btn{
  font-family:inherit;
  border:1.5px solid var(--m3-outline-variant);
  background:var(--m3-surface-container);
  color:var(--m3-on-surface-variant);
  border-radius:var(--radius-pill);
  padding:7px 12px;
  font-size:11.5px;
  font-weight:700;
  cursor:pointer;
  transition:all .15s ease;
}
.small-btn:hover{border-color:var(--m3-primary);color:var(--m3-on-surface);}
.small-btn:active{transform:scale(.96);}

.map-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.map-box{
  position:relative;
  height:76px;
  border-radius:var(--radius-m);
  overflow:hidden;
  cursor:pointer;
  background-size:cover;
  background-position:center;
  border:1.5px solid var(--m3-outline-variant);
  transition:filter .25s ease, opacity .25s ease, transform .1s ease, border-color .15s ease;
}
.map-box:active{transform:scale(.98);}
.map-box::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, rgba(0,0,0,.55), rgba(0,0,0,.15) 40%, rgba(0,0,0,.55));
}
.map-box .map-name{
  position:relative;
  z-index:1;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ffffff;
  font-size:18px;
  font-weight:800;
  letter-spacing:.02em;
  text-shadow:0 1px 4px rgba(0,0,0,.6);
}
.map-box .off-badge{
  position:absolute;
  top:6px;
  right:8px;
  z-index:2;
  background:rgba(0,0,0,.55);
  color:#fff;
  font-size:10px;
  font-weight:700;
  padding:2px 8px;
  border-radius:var(--radius-pill);
}
.map-box.off{
  filter:grayscale(1) brightness(.45);
  border-color:var(--m3-outline-variant);
}
.map-box.off .map-name{opacity:.75;}

.map-result{
  margin-top:16px;
  border-radius:var(--radius-l);
  overflow:hidden;
  position:relative;
  height:150px;
  background-size:cover;
  background-position:center;
  border:1.5px solid var(--m3-outline-variant);
  animation:mapReveal .35s ease;
}
.map-result::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.65));
}
.map-result .map-result-name{
  position:relative;
  z-index:1;
  height:100%;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding-bottom:16px;
  color:#fff;
  font-size:28px;
  font-weight:800;
  text-shadow:0 2px 6px rgba(0,0,0,.6);
}
@keyframes mapReveal{
  from{opacity:0;transform:scale(.97);}
  to{opacity:1;transform:scale(1);}
}

@media(max-width:420px){
  .menu-tab{font-size:12px;padding:9px 4px;}
  .team-slot .slot-name{max-width:60px;}
  .member-chip .name{max-width:70px;}
}
</style>
</head>
<body>
<div class="app-shell">

  <header class="topbar">
    <h1><span class="accent">VLR</span> 내전 팀 생성기</h1>
    <div class="topbar-actions">
      <button class="icon-btn" id="undoBtn" title="실행 취소 (Ctrl+Z)">↺</button>
      <button class="icon-btn" id="themeBtn" title="테마 전환">🌙</button>
      <button class="icon-btn" id="resetBtn" title="초기화">⟲</button>
    </div>
  </header>

  <nav class="menu-switch">
    <button class="menu-tab active" data-menu="balanced">맞밸 팀 생성</button>
    <button class="menu-tab" data-menu="tier">티어별 팀 생성</button>
    <button class="menu-tab" data-menu="maps">맵 뽑기</button>
  </nav>

  <section class="card">
    <div class="card-header">
      <h2>멤버 리스트 <span class="member-count" id="memberCount">0 / 10</span></h2>
      <button class="icon-btn" id="copyMembersBtn" title="멤버 리스트 복사">⧉</button>
    </div>
    <input class="text-field" id="memberInput" placeholder="멤버 이름을 입력하고 Enter (최대 10명)" maxlength="14">
    <div class="chip-row" id="memberBoxes"></div>
  </section>

  <section id="balancedView" class="menu-view active">
    <div class="card">
      <h2 style="font-size:15px;font-weight:800;margin:0 0 14px;">맞밸런스 팀 배치</h2>
      <div class="balanced-grid" id="balancedGrid"></div>
      <div class="action-row">
        <button class="btn btn-filled" id="shuffleBtn" disabled>팀 섞기</button>
        <button class="btn btn-tonal hidden" id="reshuffleBtn">다시 섞기 (덜 겹치게)</button>
        <button class="btn btn-outlined hidden" id="copyBalancedBtn">팀 복사</button>
      </div>
    </div>
  </section>

  <section id="tierView" class="menu-view">
    <div class="card">
      <h2 style="font-size:15px;font-weight:800;margin:0 0 4px;">티어 기반 팀 생성</h2>
      <p style="font-size:12px;color:var(--m3-on-surface-variant);margin:0 0 14px;">멤버 10명 모두 티어를 선택하면 생성할 수 있어요.</p>
      <button class="btn btn-filled" id="generateTierBtn" disabled style="width:100%;">팀 생성</button>
      <div class="candidate-row" id="tierCandidates"></div>
      <div id="tierResultWrap"></div>
      <div class="action-row">
        <button class="btn btn-outlined hidden" id="copyTierBtn">팀 복사</button>
      </div>
    </div>
  </section>

  <section id="mapsView" class="menu-view">
    <div class="card">
      <h2 style="font-size:15px;font-weight:800;margin:0 0 12px;">맵 뽑기</h2>
      <div class="map-actions-row">
        <button class="small-btn" id="mapsOnBtn">모든 맵 켜기</button>
        <button class="small-btn" id="mapsOffBtn">모든 맵 끄기</button>
        <button class="small-btn" id="mapsMetaBtn">국룰맵 선택</button>
      </div>
      <div class="map-list" id="mapList"></div>
      <button class="btn btn-filled" id="mapPickBtn" style="width:100%;margin-top:14px;">맵 뽑기</button>
      <div id="mapResultWrap"></div>
    </div>
  </section>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";

/* ---------------- Constants ---------------- */
var TIERS = [
  {id:'iron1',label:'아이언 1',score:0,color:'#9a9a9a'},
  {id:'iron2',label:'아이언 2',score:100,color:'#9a9a9a'},
  {id:'iron3',label:'아이언 3',score:200,color:'#8a8a8a'},
  {id:'bronze1',label:'브론즈 1',score:300,color:'#d98a42'},
  {id:'bronze2',label:'브론즈 2',score:400,color:'#d98a42'},
  {id:'bronze3',label:'브론즈 3',score:500,color:'#c47732'},
  {id:'silver1',label:'실버 1',score:600,color:'#d4d4d4'},
  {id:'silver2',label:'실버 2',score:700,color:'#d4d4d4'},
  {id:'silver3',label:'실버 3',score:800,color:'#c4c4c4'},
  {id:'gold1',label:'골드 1',score:900,color:'#f2ca4c'},
  {id:'gold2',label:'골드 2',score:1000,color:'#f2ca4c'},
  {id:'gold3',label:'골드 3',score:1100,color:'#e8bd3a'},
  {id:'plat1',label:'플래티넘 1',score:1200,color:'#74aee0'},
  {id:'plat2',label:'플래티넘 2',score:1300,color:'#74aee0'},
  {id:'plat3',label:'플래티넘 3',score:1400,color:'#5f9cd6'},
  {id:'dia1',label:'다이아 1',score:1500,color:'#cb8bbb'},
  {id:'dia2',label:'다이아 2',score:1600,color:'#cb8bbb'},
  {id:'dia3',label:'다이아 3',score:1700,color:'#bd78ac'},
  {id:'asc1',label:'초월자 1',score:1800,color:'#7fe0b8'},
  {id:'asc2',label:'초월자 2',score:1900,color:'#7fe0b8'},
  {id:'asc3',label:'초월자 3',score:2000,color:'#65cf9f'},
  {id:'imm1',label:'불멸 1',score:2100,color:'#c1526f'},
  {id:'imm2',label:'불멸 2',score:2200,color:'#c1526f'},
  {id:'imm3',label:'불멸 3',score:2300,color:'#a83f5b'},
  {id:'radiant',label:'레디언트',score:2500,color:'#fdf6cf'}
];
var TIER_MAP = {};
TIERS.forEach(function(t){ TIER_MAP[t.id]=t; });

var MAP_MAP = {};
MAPS.forEach(function(m){ MAP_MAP[m.id]=m; });
var META_MAP_IDS = ['bind','haven','split','ascent'];

var LINK_COLORS = ['#4c8bf5','#5fd97a','#f2ca4c','#c774e0','#ff8a4c'];
var STORAGE_KEY = 'vlrTeamGenState_v1';
var MAX_MEMBERS = 10;
var MAX_HISTORY = 60;

/* ---------------- State ---------------- */
function defaultState(){
  return {
    theme:'dark',
    menu:'balanced',
    members:[], // {id,name,placement:{row,col}|null,tier:string|null}
    links:[], // {a:id,b:id,color}
    tierTeams:null, // {teamA:[id..],teamB:[id..]}
    tierCandidates:null, // [{teamA,teamB,diff}]
    tierSelectedIndex:-1,
    lastShuffle:null, // array of 5 bits for reshuffle-diff check
    mapEnabled:defaultMapEnabled(),
    mapPickResult:null
  };
}
function defaultMapEnabled(){
  var o = {};
  MAPS.forEach(function(m){ o[m.id] = true; });
  return o;
}
var state = loadState();
var pendingLinkId = null; // memberId awaiting pairing
var selection = null; // {loc:'list', id} | {loc:'balanced', row, col} | {loc:'tier', team:'teamA'|'teamB', idx}
var editingId = null; // member id currently being renamed
var history = [];
var suppressHistory = false;

function loadState(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      var parsed = JSON.parse(raw);
      var d = defaultState();
      for(var k in d){ if(parsed[k]===undefined) parsed[k]=d[k]; }
      return parsed;
    }
  }catch(e){}
  return defaultState();
}
function persist(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}
function snapshot(){
  if(suppressHistory) return;
  history.push(JSON.stringify(state));
  if(history.length>MAX_HISTORY) history.shift();
}
function undo(){
  if(history.length===0) return;
  var prev = history.pop();
  suppressHistory = true;
  state = JSON.parse(prev);
  persist();
  renderAll();
  suppressHistory = false;
}

function uid(){ return 'm'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ---------------- Helpers ---------------- */
function getMember(id){
  for(var i=0;i<state.members.length;i++) if(state.members[i].id===id) return state.members[i];
  return null;
}
function unplacedMembers(){
  return state.members.filter(function(m){ return !m.placement; });
}
function slotOccupant(row,col){
  for(var i=0;i<state.members.length;i++){
    var m = state.members[i];
    if(m.placement && m.placement.row===row && m.placement.col===col) return m;
  }
  return null;
}
function memberLink(id){
  for(var i=0;i<state.links.length;i++){
    var l = state.links[i];
    if(l.a===id||l.b===id) return l;
  }
  return null;
}
function linkPartner(id){
  var l = memberLink(id);
  if(!l) return null;
  return l.a===id?l.b:l.a;
}
function removeLinksFor(id){
  state.links = state.links.filter(function(l){ return l.a!==id && l.b!==id; });
}
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(function(){ toastEl.classList.remove('show'); }, 1800);
}
function rowLetters(){ return ['A','B','C','D','E']; }

/* ---------------- Theme ---------------- */
function applyTheme(){
  document.documentElement.setAttribute('data-theme', state.theme);
  $('#themeBtn').textContent = state.theme==='dark' ? '🌙' : '☀️';
}

/* ---------------- Member list ---------------- */
function addMember(name){
  name = name.trim();
  if(!name) return;
  if(state.members.length>=MAX_MEMBERS) return;
  cancelPendingLink();
  snapshot();
  state.members.push({id:uid(), name:name, placement:null, tier:null});
  persist(); renderAll();
}
function renameMember(id, newName){
  newName = newName.trim();
  var m = getMember(id);
  if(!m) return;
  if(!newName){ renderAll(); return; }
  cancelPendingLink();
  snapshot();
  m.name = newName;
  persist(); renderAll();
}
function deleteMember(id){
  cancelPendingLink();
  snapshot();
  state.members = state.members.filter(function(m){ return m.id!==id; });
  removeLinksFor(id);
  if(state.tierTeams){
    state.tierTeams.teamA = state.tierTeams.teamA.filter(function(x){return x!==id;});
    state.tierTeams.teamB = state.tierTeams.teamB.filter(function(x){return x!==id;});
  }
  clearSelection();
  persist(); renderAll();
}

function renderMemberList(){
  var list = state.menu==='balanced' ? unplacedMembers() : state.members;
  memberCountEl.textContent = state.members.length + ' / ' + MAX_MEMBERS;
  memberBoxes.innerHTML = '';
  list.forEach(function(m){
    memberBoxes.appendChild(buildMemberChip(m));
  });
  var full = state.members.length>=MAX_MEMBERS;
  memberInput.disabled = full;
  memberInput.placeholder = full ? '최대 인원(10명)에 도달했어요' : '멤버 이름을 입력하고 Enter (최대 10명)';
}

function buildMemberChip(m){
  var chip = document.createElement('div');
  chip.className = 'member-chip';
  var isSelected = selection && selection.loc==='list' && selection.id===m.id;
  if(isSelected) chip.classList.add('selected');

  if(editingId===m.id){
    var input = document.createElement('input');
    input.className = 'name-input';
    input.value = m.name;
    input.maxLength = 14;
    chip.appendChild(input);
    setTimeout(function(){ input.focus(); input.select(); },0);
    function commit(){ editingId=null; renameMember(m.id, input.value); }
    input.addEventListener('keydown', function(e){
      e.stopPropagation();
      if(e.key==='Enter'){ commit(); }
      else if(e.key==='Escape'){ editingId=null; renderAll(); }
    });
    input.addEventListener('blur', commit);
    input.addEventListener('click', function(e){ e.stopPropagation(); });
  } else {
    var nameEl = document.createElement('span');
    nameEl.className = 'name';
    nameEl.textContent = m.name;
    chip.appendChild(nameEl);
  }

  if(state.menu==='tier'){
    var sel = document.createElement('select');
    sel.className = 'tier-select';
    var placeholder = document.createElement('option');
    placeholder.value=''; placeholder.textContent='티어 선택';
    sel.appendChild(placeholder);
    TIERS.forEach(function(t){
      var opt = document.createElement('option');
      opt.value = t.id; opt.textContent = t.label;
      if(m.tier===t.id) opt.selected = true;
      sel.appendChild(opt);
    });
    var curTier = TIER_MAP[m.tier];
    sel.style.background = curTier ? curTier.color : 'var(--m3-surface-container-high)';
    sel.style.color = curTier ? '#141414' : 'var(--m3-on-surface-variant)';
    sel.addEventListener('click', function(e){ e.stopPropagation(); });
    sel.addEventListener('change', function(){
      snapshot();
      m.tier = sel.value || null;
      persist(); renderAll();
    });
    chip.appendChild(sel);
  }

  if(editingId!==m.id){
    var editBtn = document.createElement('button');
    editBtn.className = 'chip-icon-btn';
    editBtn.title = '이름 수정';
    editBtn.textContent = '✎';
    editBtn.addEventListener('click', function(e){
      e.stopPropagation();
      editingId = m.id;
      renderAll();
    });
    chip.appendChild(editBtn);

    var delBtn = document.createElement('button');
    delBtn.className = 'chip-icon-btn';
    delBtn.title = '삭제';
    delBtn.textContent = '🗑';
    delBtn.style.fontSize = '11px';
    delBtn.addEventListener('click', function(e){
      e.stopPropagation();
      deleteMember(m.id);
    });
    chip.appendChild(delBtn);
  }

  chip.addEventListener('click', function(){
    if(editingId===m.id) return;
    handleClick({loc:'list', id:m.id});
  });
  return chip;
}

/* ---------------- Selection / click routing ---------------- */
function clearSelection(){ selection = null; }

function locationOfMember(id){
  var m = getMember(id);
  if(!m) return null;
  if(m.placement) return {loc:'balanced', row:m.placement.row, col:m.placement.col};
  return {loc:'list', id:id};
}

function handleClick(target){
  // target: {loc:'list', id} | {loc:'balanced', row, col} | {loc:'tier', team, idx}
  if(pendingLinkId!==null){ pendingLinkId = null; }
  var targetMember = getTargetMember(target);

  if(!selection){
    if(targetMember){ selection = target; renderAll(); }
    return;
  }
  // clicking the same thing => deselect
  if(sameLocation(selection, target)){ clearSelection(); renderAll(); return; }

  var selMember = getTargetMember(selection);

  if(target.loc==='balanced' && selection.loc!=='tier'){
    snapshot();
    moveOrSwap(selection, target);
    clearSelection(); persist(); renderAll(); return;
  }
  if(target.loc==='list' && selection.loc!=='tier'){
    snapshot();
    moveOrSwap(selection, target);
    clearSelection(); persist(); renderAll(); return;
  }
  if(target.loc==='tier' && selection.loc==='tier'){
    snapshot();
    swapTierSlots(selection, target);
    clearSelection(); persist(); renderAll(); return;
  }
  // fallback: select new
  if(targetMember){ selection = target; renderAll(); }
}

function sameLocation(a,b){
  if(a.loc!==b.loc) return false;
  if(a.loc==='list') return a.id===b.id;
  if(a.loc==='balanced') return a.row===b.row && a.col===b.col;
  if(a.loc==='tier') return a.team===b.team && a.idx===b.idx;
  return false;
}
function getTargetMember(t){
  if(t.loc==='list') return getMember(t.id);
  if(t.loc==='balanced') return slotOccupant(t.row,t.col);
  if(t.loc==='tier') return getMember(state.tierTeams[t.team][t.idx]);
  return null;
}

function moveOrSwap(from, to){
  var fromMember = getTargetMember(from);
  var toMember = getTargetMember(to);
  // remove placements first
  function place(member, loc){
    if(!member) return;
    if(loc.loc==='list'){ member.placement = null; }
    else if(loc.loc==='balanced'){ member.placement = {row:loc.row, col:loc.col}; }
  }
  if(fromMember) place(fromMember, to);
  if(toMember && toMember!==fromMember) place(toMember, from);
}

function swapTierSlots(a,b){
  var arrA = state.tierTeams[a.team];
  var arrB = state.tierTeams[b.team];
  var tmp = arrA[a.idx];
  arrA[a.idx] = arrB[b.idx];
  arrB[b.idx] = tmp;
}

/* ---------------- Balanced grid render ---------------- */
function renderBalancedGrid(){
  balancedGrid.innerHTML = '';
  var letters = rowLetters();
  for(var row=0; row<5; row++){
    var rowEl = document.createElement('div');
    rowEl.className = 'balanced-row';
    rowEl.appendChild(buildSlot(row, 0, letters[row]+'1'));
    var div = document.createElement('div');
    div.className = 'row-divider';
    div.textContent = '−';
    rowEl.appendChild(div);
    rowEl.appendChild(buildSlot(row, 1, letters[row]+'2'));
    balancedGrid.appendChild(rowEl);
  }
  var filledCount = state.members.filter(function(m){return m.placement;}).length;
  var full = filledCount>=10;
  shuffleBtn.disabled = !full;
}

function buildSlot(row, col, label){
  var occupant = slotOccupant(row,col);
  var slot = document.createElement('div');
  slot.className = 'team-slot ' + (occupant ? 'filled' : 'empty');
  var isSelected = occupant && selection && selection.loc==='balanced' && selection.row===row && selection.col===col;
  if(isSelected) slot.classList.add('selected');

  var link = occupant ? memberLink(occupant.id) : null;
  if(link){
    slot.style.borderColor = link.color;
    slot.style.boxShadow = 'inset 0 0 0 1.5px ' + link.color;
  }

  if(occupant){
    var nameEl = document.createElement('span');
    nameEl.className = 'slot-name';
    nameEl.textContent = occupant.name;
    slot.appendChild(nameEl);

    var actions = document.createElement('div');
    actions.className = 'slot-actions';

    var linkBtn = document.createElement('button');
    linkBtn.className = 'chip-icon-btn link-btn';
    linkBtn.title = '연동';
    linkBtn.textContent = '🔗';
    if(link) linkBtn.classList.add('linked');
    if(pendingLinkId===occupant.id) linkBtn.classList.add('pending');
    if(link) linkBtn.style.color = link.color;
    linkBtn.addEventListener('click', function(mem){ return function(e){
      e.stopPropagation();
      toggleLink(mem.id);
    };}(occupant));
    actions.appendChild(linkBtn);
    slot.appendChild(actions);

    slot.addEventListener('click', function(){ handleClick({loc:'balanced', row:row, col:col}); });
  } else {
    slot.textContent = label + ' 빈 자리';
    slot.addEventListener('click', function(){ handleClick({loc:'balanced', row:row, col:col}); });
  }
  return slot;
}

function cancelPendingLink(){
  pendingLinkId = null;
}

function toggleLink(id){
  // clicking a member that is currently mid-pairing (waiting for a partner) cancels that wait
  if(pendingLinkId===id){
    pendingLinkId = null;
    renderAll();
    return;
  }
  // if we're waiting for a partner and clicked someone else, always try to pair with the pending one
  // first (this takes priority over "toggle off" so a fresh pairing never gets swallowed by an
  // unrelated existing link on the target)
  if(pendingLinkId!==null){
    var m1 = getMember(pendingLinkId), m2 = getMember(id);
    if(m1 && m2 && m1.placement && m2.placement && m1.placement.row===m2.placement.row){
      // same balanced row - already paired by definition, restart pending on the newly clicked one
      pendingLinkId = id;
      renderAll();
      return;
    }
    snapshot();
    // each member can only be part of one link at a time
    state.links = state.links.filter(function(l){ return l.a!==pendingLinkId && l.b!==pendingLinkId && l.a!==id && l.b!==id; });
    var usedColors = state.links.map(function(l){return l.color;});
    var color = LINK_COLORS.find(function(c){ return usedColors.indexOf(c)===-1; }) || LINK_COLORS[state.links.length % LINK_COLORS.length];
    state.links.push({a:pendingLinkId, b:id, color:color});
    pendingLinkId = null;
    persist(); renderAll();
    showToast('두 멤버가 연동되었습니다');
    return;
  }
  // no pending selection: clicking a linked member's icon breaks that link
  var existing = memberLink(id);
  if(existing){
    snapshot();
    state.links = state.links.filter(function(l){ return l!==existing; });
    persist(); renderAll();
    showToast('연동이 해제되었습니다');
    return;
  }
  // start a new pending selection
  pendingLinkId = id;
  renderAll();
  showToast('연동할 상대의 🔗 버튼을 눌러주세요');
}

/* ---------------- Shuffle (balanced) ---------------- */
function currentRowCols(){
  // returns array[5] of {a: memberId|null at col0, b: memberId|null at col1}
  var rows = [];
  for(var r=0;r<5;r++){
    rows.push({left:slotOccupant(r,0), right:slotOccupant(r,1)});
  }
  return rows;
}

function computeShuffleBits(prevBits){
  var rows = currentRowCols();
  // union-find with parity across rows (0..4)
  var parent = [0,1,2,3,4];
  var parityToRoot = [0,0,0,0,0];
  function find(x){
    if(parent[x]===x) return {root:x, parity:0};
    var res = find(parent[x]);
    var totalParity = parityToRoot[x] ^ res.parity;
    parent[x] = res.root;
    parityToRoot[x] = totalParity;
    return {root:res.root, parity:totalParity};
  }
  function union(x,y,relParity){
    var fx = find(x), fy = find(y);
    if(fx.root===fy.root) return; // ignore contradictions silently
    parent[fx.root] = fy.root;
    parityToRoot[fx.root] = fx.parity ^ fy.parity ^ relParity;
  }
  // build row index & col for each member
  var memberRowCol = {};
  rows.forEach(function(rowObj, idx){
    if(rowObj.left) memberRowCol[rowObj.left.id] = {row:idx, col:0};
    if(rowObj.right) memberRowCol[rowObj.right.id] = {row:idx, col:1};
  });
  state.links.forEach(function(l){
    var pa = memberRowCol[l.a], pb = memberRowCol[l.b];
    if(!pa || !pb) return;
    if(pa.row===pb.row) return;
    // constraint: s_i xor s_j == colA xor colB
    union(pa.row, pb.row, pa.col ^ pb.col);
  });
  // assign roots randomly, then derive others
  var rootChoice = {};
  var bits = [0,0,0,0,0];
  for(var r=0;r<5;r++){
    var f = find(r);
    if(rootChoice[f.root]===undefined) rootChoice[f.root] = Math.round(Math.random());
    bits[r] = rootChoice[f.root] ^ f.parity;
  }
  return bits;
}

function applyShuffleBits(bits){
  var rows = currentRowCols();
  rows.forEach(function(rowObj, idx){
    if(bits[idx]===1){
      var left = rowObj.left, right = rowObj.right;
      if(left) left.placement = {row:idx, col:1};
      if(right) right.placement = {row:idx, col:0};
    } else {
      if(rowObj.left) rowObj.left.placement = {row:idx, col:0};
      if(rowObj.right) rowObj.right.placement = {row:idx, col:1};
    }
  });
}

// groups of rows that must move together as one unit, based on the CURRENT
// (already link-consistent) arrangement. Flipping every row in a group together
// keeps any linked pair on the same side, since they're on the same side already.
function getRowComponents(){
  var parent = [0,1,2,3,4];
  function find(x){ return parent[x]===x ? x : (parent[x]=find(parent[x])); }
  function union(x,y){ var rx=find(x), ry=find(y); if(rx!==ry) parent[rx]=ry; }
  var rows = currentRowCols();
  var memberRow = {};
  rows.forEach(function(rowObj, idx){
    if(rowObj.left) memberRow[rowObj.left.id] = idx;
    if(rowObj.right) memberRow[rowObj.right.id] = idx;
  });
  state.links.forEach(function(l){
    var ra = memberRow[l.a], rb = memberRow[l.b];
    if(ra===undefined || rb===undefined || ra===rb) return;
    union(ra, rb);
  });
  var groups = {};
  for(var r=0;r<5;r++){
    var root = find(r);
    if(!groups[root]) groups[root] = [];
    groups[root].push(r);
  }
  return Object.keys(groups).map(function(k){ return groups[k]; });
}

// pick a random combination of row-components whose total row count is as
// close to 2 as possible (usually exactly 2), and flip only those rows.
function computeReshuffleBits(){
  var components = getRowComponents().slice().sort(function(){ return Math.random()-0.5; });
  var n = components.length;
  var candidates = [];
  for(var mask=1; mask<(1<<n); mask++){
    var sum = 0;
    for(var i=0;i<n;i++){ if(mask & (1<<i)) sum += components[i].length; }
    candidates.push({mask:mask, diff:Math.abs(sum-2)});
  }
  var minDiff = Math.min.apply(null, candidates.map(function(c){return c.diff;}));
  var bestCandidates = candidates.filter(function(c){ return c.diff===minDiff; });
  var chosen = bestCandidates[Math.floor(Math.random()*bestCandidates.length)];
  var bits = [0,0,0,0,0];
  for(var i=0;i<n;i++){
    if(chosen.mask & (1<<i)){
      components[i].forEach(function(r){ bits[r] = 1; });
    }
  }
  return bits;
}

function doShuffle(isReshuffle){
  cancelPendingLink();
  snapshot();
  var bits = isReshuffle ? computeReshuffleBits() : computeShuffleBits();
  applyShuffleBits(bits);
  state.lastShuffle = bits;
  persist(); renderAll();
  reshuffleBtn.classList.remove('hidden');
  copyBalancedBtn.classList.remove('hidden');
}

  var text = '현재 멤버: ' + state.members.length + '명\n' + names.join(' / ');

function copyBalancedTeams(){
  var atk=[], def=[];
  for(var r=0;r<5;r++){
    var l = slotOccupant(r,0), rr = slotOccupant(r,1);
    if(l) atk.push(l.name);
    if(rr) def.push(rr.name);
  }
  var text = '공격 팀: ' + atk.join(' / ') + '\n수비 팀: ' + def.join(' / ');
  copyToClipboardWithMessage(text, '팀 리스트가 복사되었습니다!');
}
function copyTierTeams(){
  if(!state.tierTeams) return;
  var a = state.tierTeams.teamA.map(function(id){ var m=getMember(id); return m?m.name:''; });
  var b = state.tierTeams.teamB.map(function(id){ var m=getMember(id); return m?m.name:''; });
  var text = '공격 팀: ' + a.join(' / ') + '\n수비 팀: ' + b.join(' / ');
  copyToClipboardWithMessage(text, '팀 리스트가 복사되었습니다!');
}
function copyToClipboardWithMessage(text, msg){
  function done(){ showToast(msg); }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(function(){ legacyCopy(text); done(); });
  } else {
    legacyCopy(text); done();
  }
}
function legacyCopy(text){
  var ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}

/* ---------------- Tier mode ---------------- */
function allTiersSet(){
  return state.members.length===10 && state.members.every(function(m){ return !!m.tier; });
}

function generateTierCandidates(){
  var members = state.members.slice();
  var n = members.length;
  if(n!==10) return;
  var scores = members.map(function(m){ return TIER_MAP[m.tier] ? TIER_MAP[m.tier].score : 0; });
  var partitions = [];
  var total = 1 << n;
  for(var mask=1; mask<total-1; mask++){
    var complement = (~mask) & (total-1);
    if(mask >= complement) continue;
    var popcount = 0, sumA = 0;
    for(var i=0;i<n;i++){ if(mask & (1<<i)){ popcount++; sumA += scores[i]; } }
    if(popcount!==5) continue;
    var sumB = scores.reduce(function(s,v){return s+v;},0) - sumA;
    partitions.push({mask:mask, diff:Math.abs(sumA-sumB)});
  }
  partitions.sort(function(a,b){ return a.diff-b.diff; });

  function maskToTeams(mask){
    var teamA=[], teamB=[];
    for(var i=0;i<n;i++){
      if(mask & (1<<i)) teamA.push(members[i].id); else teamB.push(members[i].id);
    }
    return {teamA:teamA, teamB:teamB};
  }
  function linksSatisfied(mask){
    var idxOf = {};
    members.forEach(function(m,i){ idxOf[m.id]=i; });
    return state.links.every(function(l){
      var ia = idxOf[l.a], ib = idxOf[l.b];
      if(ia===undefined || ib===undefined) return true;
      var sideA = (mask & (1<<ia))?1:0;
      var sideB = (mask & (1<<ib))?1:0;
      return sideA===sideB;
    });
  }
  var hasLinks = state.links.length>0;
  var filtered = hasLinks ? partitions.filter(function(p){ return linksSatisfied(p.mask); }) : partitions;
  var pool = filtered.length>0 ? filtered : partitions;

  // pick up to 5 candidates, preferring a diverse spread of diff values (still best-first)
  // so the options aren't just several teams that all happen to tie at the same diff.
  var picked = [];
  var seenDiffs = {};
  pool.forEach(function(p){
    if(picked.length>=5) return;
    if(!seenDiffs[p.diff]){ seenDiffs[p.diff]=true; picked.push(p); }
  });
  if(picked.length<5){
    pool.forEach(function(p){
      if(picked.length>=5) return;
      if(picked.indexOf(p)===-1) picked.push(p);
    });
  }
  picked.sort(function(a,b){ return a.diff-b.diff; });

  var top = picked.map(function(p){
    var t = maskToTeams(p.mask);
    return {teamA:t.teamA, teamB:t.teamB, diff:p.diff};
  });
  cancelPendingLink();
  clearSelection();
  snapshot();
  state.tierCandidates = top;
  state.tierSelectedIndex = 0;
  state.tierTeams = top.length ? {teamA:top[0].teamA.slice(), teamB:top[0].teamB.slice()} : null;
  persist(); renderAll();
}

function selectCandidate(idx){
  if(!state.tierCandidates || !state.tierCandidates[idx]) return;
  cancelPendingLink();
  snapshot();
  state.tierSelectedIndex = idx;
  var c = state.tierCandidates[idx];
  state.tierTeams = {teamA:c.teamA.slice(), teamB:c.teamB.slice()};
  persist(); renderAll();
}

function teamScore(ids){
  return ids.reduce(function(sum,id){
    var m = getMember(id);
    var t = m && TIER_MAP[m.tier];
    return sum + (t?t.score:0);
  },0);
}

function renderTierCandidates(){
  tierCandidatesEl.innerHTML = '';
  if(!state.tierCandidates) return;
  state.tierCandidates.forEach(function(c, idx){
    var btn = document.createElement('button');
    btn.className = 'candidate-btn' + (state.tierSelectedIndex===idx ? ' active' : '');
    btn.textContent = '후보 ' + (idx+1) + ' (차이 ' + c.diff + ')';
    btn.addEventListener('click', function(){ selectCandidate(idx); });
    tierCandidatesEl.appendChild(btn);
  });
}

function buildTierSlot(team, idx){
  var id = state.tierTeams[team][idx];
  var m = getMember(id);
  var slot = document.createElement('div');
  slot.className = 'team-slot ' + (m ? 'filled' : 'empty');
  var isSelected = m && selection && selection.loc==='tier' && selection.team===team && selection.idx===idx;
  if(isSelected) slot.classList.add('selected');
  var link = m ? memberLink(m.id) : null;
  if(link){
    slot.style.borderColor = link.color;
    slot.style.boxShadow = 'inset 0 0 0 1.5px ' + link.color;
  }
  if(m){
    var nameEl = document.createElement('span');
    nameEl.className = 'slot-name';
    nameEl.textContent = m.name;
    slot.appendChild(nameEl);

    var actions = document.createElement('div');
    actions.className = 'slot-actions';
    var linkBtn = document.createElement('button');
    linkBtn.className = 'chip-icon-btn link-btn';
    linkBtn.title = '연동';
    linkBtn.textContent = '🔗';
    if(link) linkBtn.classList.add('linked');
    if(pendingLinkId===m.id) linkBtn.classList.add('pending');
    if(link) linkBtn.style.color = link.color;
    linkBtn.addEventListener('click', function(mem){ return function(e){
      e.stopPropagation();
      toggleLink(mem.id);
    };}(m));
    actions.appendChild(linkBtn);
    slot.appendChild(actions);
  } else {
    slot.textContent = '빈 자리';
  }
  slot.addEventListener('click', function(){ handleClick({loc:'tier', team:team, idx:idx}); });
  return slot;
}

function renderTierResult(){
  tierResultWrap.innerHTML = '';
  if(!state.tierTeams){
    var hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.textContent = '팀 생성 버튼을 누르면 결과가 여기에 표시돼요.';
    tierResultWrap.appendChild(hint);
    copyTierBtn.classList.add('hidden');
    return;
  }
  copyTierBtn.classList.remove('hidden');
  var wrap = document.createElement('div');
  wrap.className = 'tier-teams';

  ['teamA','teamB'].forEach(function(team, tIdx){
    var col = document.createElement('div');
    col.className = 'tier-team-col';
    var title = document.createElement('div');
    title.className = 'col-title';
    title.textContent = tIdx===0 ? '공격 팀' : '수비 팀';
    col.appendChild(title);
    var scoreEl = document.createElement('div');
    scoreEl.className = 'col-score';
    scoreEl.textContent = '총점 ' + teamScore(state.tierTeams[team]);
    col.appendChild(scoreEl);
    for(var i=0;i<5;i++){
      col.appendChild(buildTierSlot(team, i));
    }
    wrap.appendChild(col);
  });
  tierResultWrap.appendChild(wrap);
}

/* ---------------- Map picker ---------------- */
function isMapEnabled(id){
  return state.mapEnabled[id] !== false;
}
function toggleMap(id){
  snapshot();
  state.mapEnabled[id] = !isMapEnabled(id);
  persist(); renderAll();
}
function setAllMaps(on){
  snapshot();
  MAPS.forEach(function(m){ state.mapEnabled[m.id] = on; });
  persist(); renderAll();
}
function selectMetaMaps(){
  snapshot();
  MAPS.forEach(function(m){ state.mapEnabled[m.id] = META_MAP_IDS.indexOf(m.id)!==-1; });
  persist(); renderAll();
  showToast('국룰맵 4개가 선택되었습니다');
}
function pickRandomMap(){
  var enabled = MAPS.filter(function(m){ return isMapEnabled(m.id); });
  if(enabled.length===0){
    showToast('켜진 맵이 없어요');
    return;
  }
  var picked = enabled[Math.floor(Math.random()*enabled.length)];
  state.mapPickResult = picked.id;
  persist(); renderAll();
}
function renderMapList(){
  mapListEl.innerHTML = '';
  MAPS.forEach(function(m){
    var enabled = isMapEnabled(m.id);
    var box = document.createElement('div');
    box.className = 'map-box' + (enabled ? '' : ' off');
    box.style.backgroundImage = "url('" + m.img + "')";
    var nameEl = document.createElement('div');
    nameEl.className = 'map-name';
    nameEl.textContent = m.name;
    box.appendChild(nameEl);
    if(!enabled){
      var badge = document.createElement('div');
      badge.className = 'off-badge';
      badge.textContent = '꺼짐';
      box.appendChild(badge);
    }
    box.addEventListener('click', function(mm){ return function(){ toggleMap(mm.id); }; }(m));
    mapListEl.appendChild(box);
  });
}
function renderMapResult(){
  mapResultWrap.innerHTML = '';
  if(!state.mapPickResult) return;
  var m = MAP_MAP[state.mapPickResult];
  if(!m) return;
  var result = document.createElement('div');
  result.className = 'map-result';
  result.style.backgroundImage = "url('" + m.img + "')";
  var nameEl = document.createElement('div');
  nameEl.className = 'map-result-name';
  nameEl.textContent = m.name;
  result.appendChild(nameEl);
  mapResultWrap.appendChild(result);
}

/* ---------------- Menu switching ---------------- */
function switchMenu(menu){
  state.menu = menu;
  pendingLinkId = null;
  clearSelection();
  editingId = null;
  persist();
  renderAll();
}

/* ---------------- Render all ---------------- */
function renderAll(){
  applyTheme();
  document.querySelectorAll('.menu-tab').forEach(function(btn){
    btn.classList.toggle('active', btn.getAttribute('data-menu')===state.menu);
  });
  $('#balancedView').classList.toggle('active', state.menu==='balanced');
  $('#tierView').classList.toggle('active', state.menu==='tier');
  $('#mapsView').classList.toggle('active', state.menu==='maps');

  renderMemberList();
  renderBalancedGrid();

  reshuffleBtn.classList.toggle('hidden', !state.lastShuffle);
  copyBalancedBtn.classList.toggle('hidden', !state.lastShuffle);

  generateTierBtn.disabled = !allTiersSet();
  renderTierCandidates();
  renderTierResult();

  renderMapList();
  renderMapResult();

  $('#undoBtn').disabled = history.length===0;
}

/* ---------------- Events ---------------- */
memberInput.addEventListener('keydown', function(e){
  if(e.key==='Enter'){
    e.preventDefault();
    addMember(memberInput.value);
    memberInput.value = '';
  }
});

document.querySelectorAll('.menu-tab').forEach(function(btn){
  btn.addEventListener('click', function(){ switchMenu(btn.getAttribute('data-menu')); });
});

$('#copyMembersBtn').addEventListener('click', copyMembers);
shuffleBtn.addEventListener('click', function(){ if(!shuffleBtn.disabled) doShuffle(false); });
reshuffleBtn.addEventListener('click', function(){ doShuffle(true); });
copyBalancedBtn.addEventListener('click', copyBalancedTeams);
generateTierBtn.addEventListener('click', function(){ if(!generateTierBtn.disabled) generateTierCandidates(); });
copyTierBtn.addEventListener('click', copyTierTeams);

$('#mapsOnBtn').addEventListener('click', function(){ setAllMaps(true); });
$('#mapsOffBtn').addEventListener('click', function(){ setAllMaps(false); });
$('#mapsMetaBtn').addEventListener('click', selectMetaMaps);
mapPickBtn.addEventListener('click', pickRandomMap);

$('#themeBtn').addEventListener('click', function(){
  state.theme = state.theme==='dark' ? 'light' : 'dark';
  persist(); applyTheme();
});
$('#undoBtn').addEventListener('click', undo);
var resetBtnEl = $('#resetBtn');
var resetConfirmPending = false;
var resetConfirmTimer = null;
resetBtnEl.addEventListener('click', function(){
  if(!resetConfirmPending){
    resetConfirmPending = true;
    resetBtnEl.style.background = 'var(--m3-error)';
    resetBtnEl.style.color = '#141414';
    showToast('한 번 더 누르면 전체 초기화돼요');
    clearTimeout(resetConfirmTimer);
    resetConfirmTimer = setTimeout(function(){
      resetConfirmPending = false;
      resetBtnEl.style.background = '';
      resetBtnEl.style.color = '';
    }, 3000);
    return;
  }
  clearTimeout(resetConfirmTimer);
  resetConfirmPending = false;
  resetBtnEl.style.background = '';
  resetBtnEl.style.color = '';
  history = [];
  var theme = state.theme;
  state = defaultState();
  state.theme = theme;
  pendingLinkId = null; clearSelection(); editingId = null;
  persist(); renderAll();
  showToast('초기화되었습니다');
});

document.addEventListener('keydown', function(e){
  var tag = document.activeElement && document.activeElement.tagName;
  if(tag==='INPUT' || tag==='TEXTAREA') return;
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='z'){
    e.preventDefault();
    undo();
  }
});

/* ---------------- Init ---------------- */
renderAll();

})();
</script>
</body>
</html>
